name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for PyPI trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Verify version sync against tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(grep -E '__version__' src/scifig/_version.py | sed -E 's/.*"([^"]+)".*/\1/')
          PY=$(grep -E '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$PY" ]; then
            echo "Version mismatch: tag=$TAG _version=$PKG pyproject=$PY"
            exit 1
          fi
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If you do not have PyPI trusted publishing set up yet, uncomment and
        # replace with a token. Trusted publishing is the recommended path.
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
